name: Weekly Tour du Monde

on:
  schedule:
    - cron: '0 14 * * 6'  # samedi 14h UTC = 16h Paris (heure d'été)
  workflow_dispatch:       # déclenchement manuel pour tests

permissions:
  contents: write

jobs:
  generate-program:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run orchestrator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python -m agents.orchestrator

      - name: Commit updated data files
        run: |
          git config user.name "Tour du Monde Bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: programme semaine $(date +%Y-%m-%d) [skip ci]"
          git push
