<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>krousty.uk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080f1a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background-image:
        radial-gradient(ellipse 100% 50% at 50% -5%, rgba(99,102,241,.18) 0%, transparent 65%),
        radial-gradient(ellipse 60% 30% at 50% 110%, rgba(16,185,129,.07) 0%, transparent 60%);
    }

    .eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #3f4f67;
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -.03em;
      color: #f8fafc;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 0.88rem;
      color: #3f4f67;
      margin-bottom: 56px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    a.card {
      position: relative;
      display: flex;
      flex-direction: column;
      width: 300px;
      padding: 36px 32px 30px;
      background: #0d1829;
      border: 1px solid #1a2740;
      border-radius: 20px;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: border-color .2s, transform .25s, box-shadow .25s;
    }

    a.card:hover {
      border-color: #2d3f5a;
      transform: translateY(-6px);
      box-shadow: 0 28px 56px rgba(0,0,0,.6);
    }

    /* Glow behind icon */
    a.card::before {
      content: '';
      position: absolute;
      top: -40px; left: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity .3s;
    }
    a.card:nth-child(1)::before { background: radial-gradient(circle, rgba(99,102,241,.3), transparent 70%); }
    a.card:nth-child(2)::before { background: radial-gradient(circle, rgba(16,185,129,.3), transparent 70%); }
    a.card:hover::before { opacity: 1; }

    /* Top accent line */
    a.card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity .2s;
    }
    a.card:nth-child(1)::after { background: linear-gradient(90deg, #6366f1, #8b5cf6); }
    a.card:nth-child(2)::after { background: linear-gradient(90deg, #10b981, #3b82f6); }
    a.card:hover::after { opacity: 1; }

    .card-icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 22px;
      position: relative;
      z-index: 1;
    }
    a.card:nth-child(1) .card-icon-wrap { background: rgba(99,102,241,.18); }
    a.card:nth-child(2) .card-icon-wrap { background: rgba(16,185,129,.18); }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .card-desc {
      font-size: 0.83rem;
      color: #3f4f67;
      line-height: 1.6;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .card-link {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 28px;
      font-size: 0.8rem;
      font-weight: 600;
      transition: color .2s, gap .2s;
      position: relative;
      z-index: 1;
      color: #2d3f5a;
    }
    a.card:nth-child(1):hover .card-link { color: #818cf8; gap: 10px; }
    a.card:nth-child(2):hover .card-link { color: #34d399; gap: 10px; }

    @media (max-width: 520px) {
      .cards { gap: 14px; flex-direction: column; align-items: center; }
      a.card { width: 100%; max-width: 340px; flex-direction: row; align-items: center; gap: 18px; padding: 22px 24px; }
      .card-icon-wrap { margin-bottom: 0; flex-shrink: 0; width: 48px; height: 48px; }
      .card-link { display: none; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <p class="eyebrow">Espace famille</p>
  <h1>krousty.uk</h1>
  <p class="tagline">Bienvenue chez les Bouamar 👋</p>
  <div class="cards">
    <a class="card" href="https://pronote.krousty.uk">
      <span class="card-icon-wrap">📚</span>
      <span class="card-title">Pronote Dashboard</span>
      <span class="card-desc">Notes, devoirs et emploi du temps de Liam</span>
      <span class="card-link">Accéder →</span>
    </a>
    <a class="card" href="https://family.krousty.uk">
      <span class="card-icon-wrap">🌍</span>
      <span class="card-title">Tour du monde</span>
      <span class="card-desc">Programme culturel hebdomadaire de la famille</span>
      <span class="card-link">Accéder →</span>
    </a>
  </div>
</body>
</html>
