<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>krousty.uk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: .05em;
      margin-bottom: 48px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 200px;
      padding: 32px 24px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, background .15s, transform .15s;
    }

    a.card:hover {
      border-color: #3b82f6;
      background: #1e3a5f;
      transform: translateY(-3px);
    }

    .card-icon {
      font-size: 2.4rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #f1f5f9;
      text-align: center;
    }

    .card-desc {
      font-size: .8rem;
      color: #64748b;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>krousty.uk</h1>
  <div class="cards">
    <a class="card" href="https://pronote.krousty.uk">
      <span class="card-icon">📚</span>
      <span class="card-title">Pronote Dashboard</span>
      <span class="card-desc">Notes, devoirs et emploi du temps de Liam</span>
    </a>
    <a class="card" href="https://family.krousty.uk">
      <span class="card-icon">🌍</span>
      <span class="card-title">Tour du monde</span>
      <span class="card-desc">Programme culturel hebdomadaire de la famille</span>
    </a>
  </div>
</body>
</html>
