server {
    listen 8081;
    server_name localhost;

    # Site web (web/index.html)
    location / {
        root /home/hbouamar/family-world-tour/web;
        try_files $uri $uri/ /index.html;
    }

    # Données JSON (data/*.json) — no-cache pour refléter les mises à jour du samedi
    location /data/ {
        alias /home/hbouamar/family-world-tour/data/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
