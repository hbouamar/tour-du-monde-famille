<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour du Monde en Famille 🌍</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo: #6366f1;
      --indigo-dark: #4f46e5;
      --purple: #7c3aed;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --text2: #64748b;
      --text3: #94a3b8;
      --border: #e2e8f0;
      --radius: 14px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── HEADER ─────────────────────────────────────────── */
    header {
      background: linear-gradient(160deg, #6366f1 0%, #7c3aed 55%, #9333ea 100%);
      color: white;
      padding: 2.5rem 1.5rem 1.75rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='1' fill='white' fill-opacity='.06'/%3E%3C/svg%3E");
    }
    header > * { position: relative; }

    header h1 {
      font-size: clamp(1.3rem, 4vw, 1.6rem);
      font-weight: 800;
      letter-spacing: -.02em;
      margin-bottom: 0.2rem;
    }
    header .subtitle {
      opacity: 0.6;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .country-badge {
      display: inline-block;
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 2rem;
      padding: 0.5rem 1.4rem;
      font-size: 1.4rem;
      font-weight: 800;
      margin: 1rem 0 0.5rem;
      letter-spacing: .01em;
    }

    .progress-bar-wrap {
      background: rgba(255,255,255,.18);
      border-radius: 1rem;
      height: 5px;
      max-width: 260px;
      margin: 0.8rem auto 0.3rem;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #6ee7b7;
      border-radius: 1rem;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }
    .progress-label { font-size: 0.76rem; opacity: 0.65; }

    /* ─── NAV ─────────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      max-width: 100%;
    }
    .tab-btn {
      flex: 1;
      padding: 0.875rem 0.5rem;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text2);
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active {
      color: var(--indigo-dark);
      border-bottom-color: var(--indigo-dark);
    }
    .tab-btn:not(.active):hover { color: var(--text); }

    /* ─── MAIN ────────────────────────────────────────────── */
    main { max-width: 1100px; margin: 1.5rem auto; padding: 0 1.5rem 4rem; }

    /* ─── IMAGES SECTION ──────────────────────────────────── */
    .images-section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.125rem 1.125rem 1.375rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .images-section h2 {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text3);
      margin-bottom: 0.875rem;
    }
    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.625rem;
    }
    .image-card {
      border-radius: 9px;
      overflow: hidden;
      background: var(--bg);
      border: 1px solid var(--border);
      transition: transform .15s, box-shadow .15s;
    }
    .image-card:hover { transform: scale(1.04); box-shadow: var(--shadow-md); }
    .image-card img {
      width: 100%;
      height: 76px;
      object-fit: cover;
      display: block;
    }
    .image-card .img-placeholder {
      width: 100%;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      background: #f1f5f9;
    }
    .image-card span {
      display: block;
      font-size: 0.66rem;
      font-weight: 600;
      color: var(--text2);
      padding: 0.28rem 0.4rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── DAY CARDS ───────────────────────────────────────── */
    .day-card {
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 1rem;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      border-left-width: 3px;
    }
    .day-header {
      padding: 0.875rem 1.125rem;
      font-weight: 700;
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border-bottom: 1px solid var(--border);
    }
    .day-theme {
      font-weight: 500;
      font-size: 0.82rem;
      color: var(--text2);
      text-transform: none;
      letter-spacing: 0;
    }

    .day-lundi    { border-left-color: #ef4444; }
    .day-mardi    { border-left-color: #f97316; }
    .day-mercredi { border-left-color: #22c55e; }
    .day-jeudi    { border-left-color: #3b82f6; }
    .day-vendredi { border-left-color: #8b5cf6; }
    .day-samedi   { border-left-color: #ec4899; }

    .day-lundi    .day-header { color: #dc2626; }
    .day-mardi    .day-header { color: #ea580c; }
    .day-mercredi .day-header { color: #16a34a; }
    .day-jeudi    .day-header { color: #2563eb; }
    .day-vendredi .day-header { color: #7c3aed; }
    .day-samedi   .day-header { color: #db2777; }

    /* ─── ACTIVITIES ──────────────────────────────────────── */
    .activity {
      padding: 1rem 1.125rem;
      border-top: 1px solid #f1f5f9;
      display: flex;
      gap: 0.875rem;
      align-items: flex-start;
      cursor: pointer;
      transition: background .12s;
    }
    .activity:hover { background: #fafbfc; }

    .activity-icon {
      font-size: 1.35rem;
      flex-shrink: 0;
      width: 1.9rem;
      text-align: center;
      margin-top: 1px;
    }
    .activity-body { flex: 1; min-width: 0; }
    .activity-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.2rem;
      color: var(--text);
      line-height: 1.35;
    }
    .activity-desc {
      font-size: 0.81rem;
      color: var(--text2);
      line-height: 1.5;
      margin-bottom: 0.35rem;
    }
    .activity-meta {
      font-size: 0.72rem;
      color: var(--text3);
    }
    .activity-resource {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 0.4rem;
      font-size: 0.76rem;
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }
    .activity-resource:hover { text-decoration: underline; }

    .status-badge {
      flex-shrink: 0;
      padding: 0.25rem 0.75rem;
      border-radius: 2rem;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      align-self: flex-start;
      margin-top: 2px;
      transition: transform .1s, box-shadow .1s;
      letter-spacing: .01em;
      border: 1px solid transparent;
    }
    .status-badge:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .status-badge:active { transform: scale(0.9); }

    .status-todo  { background: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
    .status-doing { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
    .status-done  { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    .status-skip  { background: #fef2f2; color: #dc2626; border-color: #fecaca; text-decoration: line-through; }

    .activity.done .activity-title { text-decoration: line-through; color: var(--text3); }
    .activity.skip { opacity: 0.42; }

    /* ─── WEEK LAYOUT (sidebar desktop) ─────────────────────── */
    .week-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }
    @media (min-width: 700px) {
      .week-layout {
        grid-template-columns: 110px 1fr;
        gap: 1.5rem;
        align-items: start;
      }
      .day-selector {
        flex-direction: column !important;
        overflow: visible !important;
        margin-bottom: 0 !important;
        position: sticky;
        top: calc(49px + 1.5rem);
      }
      .day-chip {
        width: 100%;
        flex-direction: row !important;
        justify-content: space-between;
      }
    }

    /* ─── DAY SELECTOR ───────────────────────────────────────── */
    .day-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 3px;
    }
    .day-selector::-webkit-scrollbar { display: none; }

    .day-chip {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--card);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
      font-family: inherit;
      outline: none;
    }
    .day-chip:hover:not(.active) { background: #f1f5f9; }

    .chip-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #e2e8f0;
      transition: background .25s;
    }
    .chip-dot.partial { background: #f59e0b; }
    .chip-dot.full    { background: #22c55e; }

    .day-chip.active { border-width: 2px; }
    .day-chip.day-lundi.active    { border-color: #ef4444; background: #fff5f5; }
    .day-chip.day-lundi.active    .chip-label { color: #dc2626; }
    .day-chip.day-mardi.active    { border-color: #f97316; background: #fff7ed; }
    .day-chip.day-mardi.active    .chip-label { color: #ea580c; }
    .day-chip.day-mercredi.active { border-color: #22c55e; background: #f0fdf4; }
    .day-chip.day-mercredi.active .chip-label { color: #16a34a; }
    .day-chip.day-jeudi.active    { border-color: #3b82f6; background: #eff6ff; }
    .day-chip.day-jeudi.active    .chip-label { color: #2563eb; }
    .day-chip.day-vendredi.active { border-color: #8b5cf6; background: #faf5ff; }
    .day-chip.day-vendredi.active .chip-label { color: #7c3aed; }
    .day-chip.day-samedi.active   { border-color: #ec4899; background: #fdf2f8; }
    .day-chip.day-samedi.active   .chip-label { color: #db2777; }

    /* ─── HISTORY ─────────────────────────────────────────── */
    .history-card {
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 0.875rem;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .history-header {
      padding: 1rem 1.125rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: background .12s;
    }
    .history-header:hover { background: #f8fafc; }
    .history-country { font-size: 0.98rem; font-weight: 700; }
    .history-date { font-size: 0.76rem; color: var(--text3); margin-top: 2px; }
    .history-toggle { font-size: 0.75rem; color: var(--text3); }
    .history-body { display: none; border-top: 1px solid var(--border); }
    .history-body.open { display: block; }
    .history-images {
      display: flex;
      gap: 0.5rem;
      padding: 0.875rem 1.125rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .history-images::-webkit-scrollbar { display: none; }
    .history-img-card { flex-shrink: 0; text-align: center; width: 70px; }
    .history-img-card img { width: 70px; height: 50px; object-fit: cover; border-radius: 7px; display: block; }
    .history-img-card .hi-placeholder { width: 70px; height: 50px; border-radius: 7px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .history-img-card span { font-size: 0.58rem; color: var(--text3); margin-top: 3px; display: block; }
    .history-day { padding: 0.5rem 1.125rem; border-top: 1px solid #f8fafc; }
    .history-day-title { font-size: 0.7rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 0.25rem; }
    .history-activity { font-size: 0.81rem; padding: 0.15rem 0; display: flex; gap: 0.5rem; align-items: baseline; }
    .history-activity a { color: #3b82f6; font-size: 0.71rem; text-decoration: none; white-space: nowrap; }
    .history-activity a:hover { text-decoration: underline; }

    /* ─── MISC ────────────────────────────────────────────── */
    #loading { text-align: center; padding: 3rem; color: var(--text3); font-size: 0.9rem; }
    #error {
      background: #fef2f2;
      color: #dc2626;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      margin: 1rem 0;
      text-align: center;
      font-size: 0.85rem;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>

<header>
  <h1>🌍 Tour du Monde en Famille</h1>
  <div class="subtitle">Hassan · Yovana · Alice · Liam</div>
  <div class="country-badge" id="country-badge">…</div>
  <div class="subtitle" id="week-label"></div>
  <div class="progress-bar-wrap" id="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progress-label">Chargement…</div>
  <div class="subtitle" id="country-counter" style="margin-top:0.5rem;opacity:0.55;font-size:0.78rem"></div>
</header>

<nav>
  <button class="tab-btn active" id="tab-week" onclick="showTab('week')">Cette semaine</button>
  <button class="tab-btn" id="tab-history" onclick="showTab('history')">Historique</button>
</nav>

<main id="main">
  <div id="loading">Chargement du programme…</div>
</main>
<main id="main-history" style="display:none; max-width:960px; margin:1.5rem auto; padding:0 1.5rem 3rem;">
  <div id="loading-history">Chargement de l'historique…</div>
</main>

<script>
const RAW = '/data';

const DAYS_FR = {
  lundi: 'Lundi', mardi: 'Mardi', mercredi: 'Mercredi',
  jeudi: 'Jeudi', vendredi: 'Vendredi', samedi: 'Samedi'
};

const TYPE_ICONS = {
  cuisine: '🍳', 'art/artisanat': '🎨', 'musique/danse': '🎵',
  'histoire/géographie': '🗺️', film: '🎬', livre: '📚',
  'jeux/sports traditionnels': '🎯', default: '✨'
};

const _activityStore = {};  // id → activity object

const STATUS_CYCLE = ['todo', 'doing', 'done', 'skip'];
const STATUS_LABELS = { todo: '⬜ À faire', doing: '🔄 En cours', done: '✅ Fait', skip: '⏭️ Passé' };

const FLAGS = {
  'Japon': '🇯🇵', 'Brésil': '🇧🇷', 'Égypte': '🇪🇬', 'Inde': '🇮🇳',
  'Mexique': '🇲🇽', 'Italie': '🇮🇹', 'Maroc': '🇲🇦', 'Chine': '🇨🇳',
  'France': '🇫🇷', 'Kenya': '🇰🇪', 'Australie': '🇦🇺', 'Grèce': '🇬🇷',
  'Pérou': '🇵🇪', 'Russie': '🇷🇺', 'Turquie': '🇹🇷', 'Vietnam': '🇻🇳',
  'Thaïlande': '🇹🇭', 'Nigeria': '🇳🇬', 'Argentine': '🇦🇷', 'Allemagne': '🇩🇪',
  'Portugal': '🇵🇹', 'Espagne': '🇪🇸', 'Sénégal': '🇸🇳', 'Éthiopie': '🇪🇹',
  'Colombie': '🇨🇴', 'Corée du Sud': '🇰🇷', 'Indonésie': '🇮🇩',
};

function getProgress() {
  try { return JSON.parse(localStorage.getItem('progress') || '{}'); }
  catch { return {}; }
}
function saveProgress(p) {
  localStorage.setItem('progress', JSON.stringify(p));
}
function clearProgressIfNewWeek(weekStart) {
  const stored = localStorage.getItem('week_start');
  if (stored !== weekStart) {
    localStorage.removeItem('progress');
    localStorage.setItem('week_start', weekStart);
  }
}

function updateProgressUI(progress, totalActivities) {
  const done = Object.values(progress).filter(s => s === 'done').length;
  const pct  = totalActivities ? Math.round(done / totalActivities * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${totalActivities} activités réalisées`;
}

function formatWeekLabel(weekStart) {
  const d = new Date(weekStart + 'T12:00:00');
  const end = new Date(d); end.setDate(d.getDate() + 5);
  const fmt = dt => dt.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
  return `Semaine du ${fmt(d)} au ${fmt(end)}`;
}

// State partagé entre render / switchDay / updateChipDots
const _state = { days: {}, progress: {}, total: 0, country: '' };

const DAY_ABBR = {
  lundi: 'Lun', mardi: 'Mar', mercredi: 'Mer',
  jeudi: 'Jeu', vendredi: 'Ven', samedi: 'Sam'
};
const TODAY_MAP = {
  0: 'dimanche', 1: 'lundi', 2: 'mardi', 3: 'mercredi',
  4: 'jeudi', 5: 'vendredi', 6: 'samedi'
};

function updateChipDots() {
  Object.keys(_state.days).forEach(day => {
    const acts = _state.days[day].activities || [];
    const done = acts.filter(a => _state.progress[a.id] === 'done').length;
    const dot = document.querySelector(`.day-chip.day-${day} .chip-dot`);
    if (!dot) return;
    dot.className = 'chip-dot' + (done === acts.length && acts.length > 0 ? ' full' : done > 0 ? ' partial' : '');
  });
}

function switchDay(day) {
  // Update active chip
  document.querySelectorAll('.day-chip').forEach(c => c.classList.remove('active'));
  document.querySelector(`.day-chip.day-${day}`)?.classList.add('active');

  // Render day content
  const container = document.getElementById('day-view');
  container.innerHTML = '';

  const data = _state.days[day];
  if (!data) return;

  const card = document.createElement('div');
  card.className = `day-card day-${day}`;

  const header = document.createElement('div');
  header.className = 'day-header';
  header.innerHTML = `<span>${DAYS_FR[day] || day}</span><span class="day-theme">${data.theme || ''}</span>`;
  card.appendChild(header);

  for (const act of (data.activities || [])) {
    _activityStore[act.id] = { ...act, country: _state.country };
    const status = _state.progress[act.id] || 'todo';
    const icon   = TYPE_ICONS[act.type] || TYPE_ICONS.default;

    const el = document.createElement('div');
    el.className = `activity ${status}`;
    el.dataset.id = act.id;
    el.innerHTML = `
      <div class="activity-icon">${icon}</div>
      <div class="activity-body">
        <div class="activity-title">${act.title}</div>
        <div class="activity-desc">${act.description}</div>
        <div class="activity-meta">${act.duration || ''} · ${act.type || ''}</div>
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
          ${act.resource_query ? `<a class="activity-resource" href="https://www.youtube.com/results?search_query=${encodeURIComponent(act.resource_query)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ Voir une vidéo</a>` : ''}
          ${act.type === 'cuisine' ? `<a class="activity-resource" style="color:#16a34a" href="#" data-recipe-id="${act.id}" onclick="event.stopPropagation();event.preventDefault();printRecipe(this.dataset.recipeId)">🖨️ Recette</a>` : ''}
        </div>
      </div>
      <div class="status-badge status-${status}" data-id="${act.id}">${STATUS_LABELS[status]}</div>
    `;

    el.addEventListener('click', () => {
      const p = _state.progress;
      const cur = p[act.id] || 'todo';
      const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur) + 1) % STATUS_CYCLE.length];
      p[act.id] = next;
      saveProgress(p);
      el.className = `activity ${next}`;
      el.querySelector('.status-badge').className = `status-badge status-${next}`;
      el.querySelector('.status-badge').textContent = STATUS_LABELS[next];
      updateProgressUI(p, _state.total);
      updateChipDots();
    });

    card.appendChild(el);
  }
  container.appendChild(card);
}

function render(program, progress) {
  // Populate shared state
  _state.days     = program.days || {};
  _state.progress = progress;
  _state.country  = program.country || '';
  _state.total    = Object.values(_state.days).reduce((s, d) => s + (d.activities || []).length, 0);

  const main = document.getElementById('main');
  main.innerHTML = '';

  // Day selector chips
  const selector = document.createElement('div');
  selector.className = 'day-selector';
  Object.keys(_state.days).forEach(day => {
    const chip = document.createElement('button');
    chip.className = `day-chip day-${day}`;
    chip.innerHTML = `<span class="chip-label">${DAY_ABBR[day] || day}</span><span class="chip-dot"></span>`;
    chip.addEventListener('click', () => switchDay(day));
    selector.appendChild(chip);
  });

  // Container for the selected day view
  const dayView = document.createElement('div');
  dayView.id = 'day-view';

  // Wrap both in a 2-col grid (desktop sidebar)
  const layout = document.createElement('div');
  layout.className = 'week-layout';
  layout.appendChild(selector);
  layout.appendChild(dayView);
  main.appendChild(layout);

  // Default to today if in the program, otherwise first day
  const todayKey = TODAY_MAP[new Date().getDay()];
  const defaultDay = _state.days[todayKey] ? todayKey : Object.keys(_state.days)[0];
  switchDay(defaultDay);
  updateChipDots();
  updateProgressUI(progress, _state.total);
}

async function fetchWikiImage(wiki_en) {
  try {
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wiki_en)}`);
    const data = await res.json();
    return {
      thumb: data.thumbnail?.source || null,
      full: data.originalimage?.source || data.thumbnail?.source || null
    };
  } catch { return { thumb: null, full: null }; }
}

function renderImages(items) {
  if (!items.length) return;
  const main = document.getElementById('main');
  const section = document.createElement('div');
  section.className = 'images-section';
  section.innerHTML = `
    <h2><span>🖨️ Images à imprimer</span></h2>
    <div class="images-grid" id="images-grid"></div>
  `;
  main.prepend(section);

  const grid = document.getElementById('images-grid');
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'image-card';
    card.id = `img-${item.wiki_en}`;
    card.innerHTML = `<div class="img-placeholder">🌍</div><span>${item.label}</span>`;
    grid.appendChild(card);

    fetchWikiImage(item.wiki_en).then(({ thumb, full }) => {
      if (thumb) {
        const link = full ? `href="${full}" target="_blank" rel="noopener"` : '';
        card.querySelector('.img-placeholder').outerHTML =
          `<a ${link} title="Ouvrir l'image complète" onclick="event.stopPropagation()"><img src="${thumb}" alt="${item.label}" loading="lazy"></a>`;
      }
    });
  });
}


function printRecipe(id) {
  const act = _activityStore[id];
  if (!act) return;
  const ytUrl = act.resource_query
    ? `https://www.youtube.com/results?search_query=${encodeURIComponent(act.resource_query)}`
    : null;
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
    <title>Recette : ${act.title}</title>
    <style>
      body { font-family: Georgia, serif; max-width: 600px; margin: 2rem auto; padding: 0 1.5rem; color: #2d3748; }
      h1 { font-size: 1.6rem; margin-bottom: 0.3rem; }
      .meta { color: #718096; font-size: 0.9rem; margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.75rem; }
      .description { font-size: 1rem; line-height: 1.7; white-space: pre-wrap; }
      .yt-link { display:block; margin-top: 1.5rem; font-size: 0.85rem; color: #4299e1; }
      .footer { margin-top: 2rem; padding-top: 0.75rem; border-top: 1px solid #e2e8f0; font-size: 0.75rem; color: #a0aec0; text-align: center; }
      @media print { @page { margin: 1.5cm; } a { color: inherit; } }
    </style></head><body>
    <h1>🍳 ${act.title}</h1>
    <div class="meta">${act.country || ''} · ${act.duration || ''}</div>
    <div class="description">${act.description}</div>
    ${ytUrl ? `<a class="yt-link" href="${ytUrl}" target="_blank">▶ Voir la recette en vidéo : ${ytUrl}</a>` : ''}
    <div class="footer">Tour du Monde en Famille 🌍</div>
    <script>window.onload = () => window.print();<\/script>
  </body></html>`);
  win.document.close();
}

function showTab(tab) {
  const isWeek = tab === 'week';
  document.getElementById('main').style.display = isWeek ? '' : 'none';
  document.getElementById('main-history').style.display = isWeek ? 'none' : '';
  document.getElementById('tab-week').classList.toggle('active', isWeek);
  document.getElementById('tab-history').classList.toggle('active', !isWeek);
  document.getElementById('progress-bar-wrap').style.display = isWeek ? '' : 'none';
}

function renderHistory(archive) {
  const container = document.getElementById('main-history');
  if (!archive.length) {
    container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:2rem">Aucun pays dans l\'historique pour l\'instant.</p>';
    return;
  }
  container.innerHTML = '';
  const DAYS_ORDER = ['lundi','mardi','mercredi','jeudi','vendredi','samedi'];

  archive.forEach(entry => {
    const flag = FLAGS[entry.country] || '🌍';
    const card = document.createElement('div');
    card.className = 'history-card';

    const header = document.createElement('div');
    header.className = 'history-header';
    header.innerHTML = `
      <div>
        <div class="history-country">${flag} ${entry.country}</div>
        <div class="history-date">${formatWeekLabel(entry.week_start)}</div>
      </div>
      <span class="history-toggle">▼</span>`;
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'history-body';

    // Images row
    if (entry.cultural_images?.length) {
      const imgRow = document.createElement('div');
      imgRow.className = 'history-images';
      entry.cultural_images.forEach(item => {
        const ic = document.createElement('div');
        ic.className = 'history-img-card';
        ic.innerHTML = `<div class="hi-placeholder">🌍</div><span>${item.label}</span>`;
        imgRow.appendChild(ic);
        fetchWikiImage(item.wiki_en).then(({ thumb }) => {
          if (thumb) ic.querySelector('.hi-placeholder').outerHTML = `<img src="${thumb}" alt="${item.label}" loading="lazy">`;
        });
      });
      body.appendChild(imgRow);
    }

    // Days
    const days = entry.days || {};
    DAYS_ORDER.filter(d => days[d]).forEach(day => {
      const dayEl = document.createElement('div');
      dayEl.className = 'history-day';
      const acts = (days[day].activities || []).map(a => {
        const yt = a.resource_query
          ? `<a href="https://www.youtube.com/results?search_query=${encodeURIComponent(a.resource_query)}" target="_blank" rel="noopener">▶ vidéo</a>`
          : '';
        return `<div class="history-activity"><span>${TYPE_ICONS[a.type] || '✨'} ${a.title}</span>${yt}</div>`;
      }).join('');
      dayEl.innerHTML = `<div class="history-day-title">${DAYS_FR[day]} — ${days[day].theme || ''}</div>${acts}`;
      body.appendChild(dayEl);
    });

    header.addEventListener('click', () => {
      const open = body.classList.toggle('open');
      header.querySelector('.history-toggle').textContent = open ? '▲' : '▼';
    });

    card.appendChild(body);
    container.appendChild(card);
  });
}

async function init() {
  try {
    const [progRes, dataRes] = await Promise.all([
      fetch(`${RAW}/progress.json`),
      fetch(`${RAW}/current_program.json`)
    ]);
    const program  = await dataRes.json();
    const serverProgress = await progRes.json();

    clearProgressIfNewWeek(program.week_start);
    const localProgress = getProgress();

    // Merge: local overrides server for keys that exist locally
    const progress = Object.fromEntries(
      Object.keys(serverProgress).map(k => [k, localProgress[k] || serverProgress[k]])
    );

    const flag = FLAGS[program.country] || '🌍';
    document.getElementById('country-badge').textContent = `${flag} ${program.country}`;
    document.getElementById('week-label').textContent = formatWeekLabel(program.week_start);
    document.title = `${flag} ${program.country} – Tour du Monde`;

    render(program, progress);
    renderImages(program.cultural_images || []);

    // Load history in background
    fetch(`${RAW}/archive.json`)
      .then(r => r.json())
      .then(archive => {
        renderHistory(archive);
        const total = archive.length + 1; // +1 for current week
        document.getElementById('country-counter').textContent =
          `${total} pays exploré${total > 1 ? 's' : ''} 🗺️`;
      })
      .catch(() => renderHistory([]));

  } catch (e) {
    document.getElementById('main').innerHTML =
      `<div id="error">Impossible de charger le programme.<br><small>${e.message}</small></div>`;
    document.getElementById('progress-label').textContent = '';
    document.getElementById('country-badge').textContent = '🌍';
  }
}

init();
</script>
